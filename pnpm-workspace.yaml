packages:
  - "packages/*"
  - "apps/*"
  # The plugin is a workspace member only so its skill↔CLI check runs in CI.
  - "plugins/claude-code"
allowBuilds:
  # Needed by vitest and by the tsup bundle that becomes plugin/bin/holiday.mjs.
  esbuild: true
  # next/image's optimizer in apps/docs.
  sharp: true
minimumReleaseAgeExclude:
  - '@tabler/icons-react@3.45.0'
  - '@tabler/icons@3.45.0'
